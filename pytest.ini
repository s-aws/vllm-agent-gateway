[pytest]
addopts = -p no:cacheprovider -m "not advanced_workflow" --strict-markers
testpaths = tests
markers =
    advanced_workflow: deferred post-L1 workflow coverage, including broad refactor, implementation-prep continuation, and disposable-apply paths.
    serial: tests that must run in the serial regression lane because they touch shared repo state, fixed runtime-state paths, fixed external resources, process-global state, or timing-sensitive reset/recovery behavior.
    requires_baseline_artifacts: tests that require accepted local proof artifacts under ignored runtime-state paths and are not valid clean-clone static replay tests.
